name: InkIt
options:
  bundleIdPrefix: com.aiqiliu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: Z84U66EYPZ
    CODE_SIGN_IDENTITY: "Developer ID Application"
    OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  InkIt:
    type: application
    platform: macOS
    sources:
      - path: InkIt
        excludes:
          - Info.plist
    resources:
      - path: InkIt/Assets.xcassets
    info:
      path: InkIt/Info.plist
      properties:
        CFBundleDisplayName: InkIt
        CFBundleName: InkIt
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "2"
        LSMinimumSystemVersion: "14.0"
        # Show in Dock so users can always click the icon to bring up the
        # control window. (Was LSUIElement=true earlier; reverted because some
        # systems don't render the menu bar item reliably.)
        LSUIElement: false
        NSHighResolutionCapable: true
        NSMicrophoneUsageDescription: "InkIt records your voice while you hold the dictation hotkey and streams it to Cartesia STT for transcription."
        NSAppleEventsUsageDescription: "InkIt pastes the transcribed text into the focused app."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiqiliu.InkIt
        # Drives Color.accentColor / system control tints from the
        # AccentColor asset (indigo, light + dark) — see DESIGN_SYSTEM.md.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # No App Sandbox: synthesized Cmd+V via Accessibility requires an
        # unsandboxed binary.
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: InkIt/InkIt.entitlements

  InkItTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: InkItTests
    dependencies:
      - target: InkIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiqiliu.InkItTests
        # The test bundle uses the main app as its host so it can link
        # against the app's compiled sources.
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/InkIt.app/Contents/MacOS/InkIt"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
